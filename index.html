        // ========== ISRAELI CITIES LIST ==========

          'תל אביב-יפו', 'תל שבע'
        ];

        // City Autocomplete Component
        const CityAutocomplete = ({ value, onChange, required = false }) => {
          const [inputValue, setInputValue] = useState(value || '');
          const [suggestions, setSuggestions] = useState([]);
          const [showSuggestions, setShowSuggestions] = useState(false);

          const handleInputChange = (e) => {
            const val = e.target.value;
            setInputValue(val);
            onChange(val);

            if (val.length > 0) {
              const filtered = ISRAELI_CITIES.filter(city => 
                city.includes(val) || city.startsWith(val)
              ).slice(0, 10);
              setSuggestions(filtered);
              setShowSuggestions(true);
            } else {
              setSuggestions([]);
              setShowSuggestions(false);
            }
          };

          const selectCity = (city) => {
            setInputValue(city);
            onChange(city);
            setShowSuggestions(false);
          };

          return (
            <div className="relative">
              <input
                type="text"
                required={required}
                className="w-full p-3 border rounded-lg"
                placeholder="התחל להקליד שם עיר..."
                value={inputValue}
                onChange={handleInputChange}
                onFocus={() => inputValue && setSuggestions(ISRAELI_CITIES.filter(c => c.includes(inputValue)).slice(0, 10)) && setShowSuggestions(true)}
                onBlur={() => setTimeout(() => setShowSuggestions(false), 200)}
              />
              {showSuggestions && suggestions.length > 0 && (
                <div className="absolute z-10 w-full mt-1 bg-white border rounded-lg shadow-lg max-h-60 overflow-y-auto">
                  {suggestions.map((city, index) => (
                    <div
                      key={index}
                      className="p-3 hover:bg-blue-50 cursor-pointer transition"
                      onClick={() => selectCity(city)}
                    >
                      {city}
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        };

        // ========== USER ROLES ==========
        const USER_ROLES = {
          REGULAR: 'regular',
          AGENT: 'agent',
          ADMIN: 'admin'
        };

        // ========== ACTIVITY LOG TYPES ==========
        const LOG_TYPES = {
          USER_LOGIN: 'user_login',
          USER_LOGOUT: 'user_logout',
          USER_REGISTER: 'user_register',
          PROPERTY_CREATE: 'property_create',
          PROPERTY_EDIT: 'property_edit',
          PROPERTY_DELETE: 'property_delete',
          PROPERTY_VIEW: 'property_view',
          USER_CREATE: 'user_create',
          USER_EDIT: 'user_edit',
          USER_DELETE: 'user_delete'
        };

        // Helper function to add activity log
        const addActivityLog = async (type, userId, userName, details = {}) => {
          const newLog = {
            type,
            userId,
            userName,
            details,
            timestamp: new Date().toISOString()
          };
          
          // Save to Firestore
          if (window.firebaseDB) {
            try {
              await addDoc(collection(window.firebaseDB, 'activityLogs'), newLog);
            } catch (error) {
              console.error('Error saving activity log:', error);
            }
          }
          
          return newLog;
        };

        // ========== MAIN APP COMPONENT ==========
        const RealEstatePortal = () => {
          const [properties, setProperties] = useState(() => {
            const props = getStoredData('properties', INITIAL_PROPERTIES);
            // Add views and shares counter to existing properties if not exists
            return props.map(p => ({
              ...p,
              views: p.views || 0,
              shares: p.shares || 0
            }));
          });
          const [users, setUsers] = useState(() => 
            getStoredData('users', [
              { id: '1', username: 'admin', password: 'admin123', role: USER_ROLES.ADMIN, name: 'מנהל המערכת', email: 'admin@nadlan.co.il', phone: '050-0000000' },
              { id: '2', username: 'agent1', password: 'agent123', role: USER_ROLES.AGENT, name: 'משה כהן', email: 'moshe@nadlan.co.il', phone: '050-1234567' }
            ])
          );
          const [currentUser, setCurrentUser] = useState(() => 
            getStoredData('currentUser', null)
          );
          const [activityLogs, setActivityLogs] = useState(() =>
            getStoredData('activityLogs', [])
          );
          const [favorites, setFavorites] = useState([]);
          
          // Firebase Auth State Listener - restore session on refresh
          useEffect(() => {
            if (window.firebaseAuth) {
              const unsubscribe = window.firebaseAuth.onAuthStateChanged(async (firebaseUser) => {
                if (firebaseUser) {
                  console.log('✅ Firebase user detected:', firebaseUser.email);
                  // User is signed in - get full user data from Firestore
                  try {
                    const usersRef = window.firebaseDB.collection('users');
                    const snapshot = await usersRef.where('uid', '==', firebaseUser.uid).get();
                    
                    if (!snapshot.empty) {
                      const userData = snapshot.docs[0].data();
                      const userWithId = {
                        id: snapshot.docs[0].id,
                        ...userData
                      };
                      setCurrentUser(userWithId);
                      console.log('✅ User restored from Firebase:', userWithId.name);
                    }
                  } catch (error) {
                    console.error('Error getting user data:', error);
                  }
                } else {
                  console.log('❌ No Firebase user - logged out');
                  setCurrentUser(null);
                }
              });
              
              return () => unsubscribe();
            }
          }, []);
          
          // Load favorites from currentUser when logged in
          useEffect(() => {
            if (currentUser && currentUser.favorites) {
              setFavorites(currentUser.favorites);
            } else if (!currentUser) {
              setFavorites([]);
            }
          }, [currentUser]);
          const [currentView, setCurrentView] = useState('home');
          const [selectedProperty, setSelectedProperty] = useState(null);
          const [editingProperty, setEditingProperty] = useState(null);
          const [filters, setFilters] = useState({
            searchText: '',
            city: '',
            dealType: '',
            propertyType: '',
            minPrice: '',
            maxPrice: '',
            minRooms: '',
            maxRooms: '',
            minSize: '',
            features: [],
            nearTransport: false
          });
          const [viewMode, setViewMode] = useState('grid');
          const [showFilters, setShowFilters] = useState(false);
          const [userMode, setUserMode] = useState('seeker');

          // Handle shared property links (hash-based)
          useEffect(() => {
            const handleHashChange = () => {
              const hash = window.location.hash;
              if (hash.startsWith('#property-')) {
                const propertyId = hash.replace('#property-', '');
                const property = properties.find(p => p.id === propertyId);
                if (property) {
                  setSelectedProperty(property);
                  setCurrentView('property-detail');
                  // Keep hash for sharing - don't clear it!
                  // window.history.replaceState(null, '', window.location.pathname);
                }
              }
            };

            // Check on mount
            handleHashChange();

            // Listen for hash changes
            window.addEventListener('hashchange', handleHashChange);
            return () => window.removeEventListener('hashchange', handleHashChange);
          }, [properties]);

          // Firebase real-time listener for properties
          useEffect(() => {
            if (window.firebaseDB) {
              const unsubscribe = onSnapshot(
                collection(window.firebaseDB, 'properties'),
                (snapshot) => {
                  const propertiesList = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                  }));
                  setProperties(propertiesList);
                },
                (error) => {
                  console.error('Error loading properties from Firestore:', error);
                }
              );

              return () => unsubscribe();
            }
          }, []);

          // Firebase real-time listener for users (only when logged in)
          useEffect(() => {
            if (window.firebaseDB && currentUser) {
              const unsubscribe = onSnapshot(
                collection(window.firebaseDB, 'users'),
                (snapshot) => {
                  const usersList = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                  }));
                  setUsers(usersList);
                },
                (error) => {
                  console.error('Error loading users from Firestore:', error);
                }
              );

              return () => unsubscribe();
            }
          }, [currentUser]);

          // Firebase real-time listener for activity logs
          useEffect(() => {
            if (window.firebaseDB && currentUser?.role === 'admin') {
              const unsubscribe = onSnapshot(
                collection(window.firebaseDB, 'activityLogs'),
                (snapshot) => {
                  const logsList = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                  })).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                  setActivityLogs(logsList);
                },
                (error) => {
                  console.error('Error loading activity logs from Firestore:', error);
                }
              );

              return () => unsubscribe();
            }
          }, [currentUser]);

          const filteredProperties = useMemo(() => {
            return properties.filter(prop => {
              if (prop.status !== 'active') return false;
              
              if (filters.searchText && !prop.title.toLowerCase().includes(filters.searchText.toLowerCase()) &&
                  !prop.neighborhood.toLowerCase().includes(filters.searchText.toLowerCase())) {
                return false;
              }
              
              if (filters.city && prop.city !== filters.city) return false;
              if (filters.dealType && prop.dealType !== filters.dealType) return false;
              if (filters.propertyType && prop.type !== filters.propertyType) return false;
              
              if (filters.minPrice && prop.price < parseInt(filters.minPrice)) return false;
              if (filters.maxPrice && prop.price > parseInt(filters.maxPrice)) return false;
              
              if (filters.minRooms && prop.rooms < parseFloat(filters.minRooms)) return false;
              if (filters.maxRooms && prop.rooms > parseFloat(filters.maxRooms)) return false;
              
              if (filters.minSize && prop.size < parseInt(filters.minSize)) return false;
              
              if (filters.features.length > 0 && !filters.features.every(f => prop.features.includes(f))) {
                return false;
              }
              
              if (filters.nearTransport && !prop.nearTransport) return false;
              
              return true;
            });
          }, [properties, filters]);

          // User Authentication
          const handleLogin = async (usernameOrEmail, password) => {
            try {
              if (window.firebaseAuth) {
                // Try Firebase Authentication
                let email = usernameOrEmail;
                
                // If username provided, find email from Firestore
                if (!usernameOrEmail.includes('@')) {
                  const usersRef = collection(window.firebaseDB, 'users');
                  const q = query(usersRef, where('username', '==', usernameOrEmail));
                  const querySnapshot = await getDocs(q);
                  
                  if (!querySnapshot.empty) {
                    email = querySnapshot.docs[0].data().email;
                  } else {
                    return false;
                  }
                }

                const userCredential = await signInWithEmailAndPassword(
                  window.firebaseAuth,
                  email,
                  password
                );

                // Check if email is verified (except for super admin)
                const SUPER_ADMIN_EMAIL = 'michael@itmo.co.il';
                
                if (!userCredential.user.emailVerified && userCredential.user.email !== SUPER_ADMIN_EMAIL) {
                  alert('❌ נא לאמת את כתובת המייל שלך לפני ההתחברות.\n\n📧 בדוק את תיבת המייל שלך.\n\n⚠️ לא מצאת? בדוק גם בתיקיית Spam/דואר זבל!\n\nלא קיבלת מייל? צור קשר: 050-5750000');
                  await signOut(window.firebaseAuth);
                  return false;
                }

                // Get user data from Firestore
                const usersRef = collection(window.firebaseDB, 'users');
                const q = query(usersRef, where('uid', '==', userCredential.user.uid));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                  const userData = querySnapshot.docs[0].data();
                  const userWithId = {
                    id: querySnapshot.docs[0].id,
                    ...userData
                  };
                  setCurrentUser(userWithId);
                  
                  const logs = addActivityLog(LOG_TYPES.USER_LOGIN, userWithId.id, userWithId.name);
                  setActivityLogs(logs);
                  
                  setCurrentView('home');
                  return true;
                }

                return false;
              } else {
                // Fallback to localStorage
                const user = users.find(u => u.username === usernameOrEmail && u.password === password);
                if (user) {
                  const userWithoutPassword = { ...user };
                  delete userWithoutPassword.password;
                  setCurrentUser(userWithoutPassword);
                  
                  const logs = addActivityLog(LOG_TYPES.USER_LOGIN, user.id, user.name);
                  setActivityLogs(logs);
                  
                  setCurrentView('home');
                  return true;
                }
                return false;
              }
            } catch (error) {
              console.error('Login error:', error);
              return false;
            }
          };

          const handleLogout = async () => {
            if (currentUser) {
              try {
                await addActivityLog(LOG_TYPES.USER_LOGOUT, currentUser.id, currentUser.name);
              } catch (error) {
                console.error('Activity log error:', error);
              }
            }
            
            // Sign out from Firebase if available
            if (window.firebaseAuth) {
              try {
                await signOut(window.firebaseAuth);
              } catch (error) {
                console.error('Firebase signout error:', error);
              }
            }
            
            // Clear localStorage Firebase keys
            try {
              Object.keys(localStorage).forEach(key => {
                if (key.startsWith('firebase:')) {
                  localStorage.removeItem(key);
                }
              });
            } catch (error) {
              console.error('localStorage clear error:', error);
            }
            
            setCurrentUser(null);
            setCurrentView('home');
            setUserMode('seeker');
            
            // Force page reload to ensure clean state
            setTimeout(() => {
              window.location.reload();
            }, 100);
          };

          const handleRegister = async (userData) => {
            try {
              // Check if username exists in Firestore
              const usersRef = window.firebaseDB ? collection(window.firebaseDB, 'users') : null;
              if (usersRef) {
                const q = query(usersRef, where('username', '==', userData.username));
                const querySnapshot = await getDocs(q);
                
                if (!querySnapshot.empty) {
                  return { success: false, message: 'שם המשתמש כבר קיים' };
                }

                // Create Firebase Auth user
                const userCredential = await createUserWithEmailAndPassword(
                  window.firebaseAuth,
                  userData.email,
                  userData.password
                );

                // Send verification email
                await sendEmailVerification(userCredential.user);

                // Save user data to Firestore
                const newUser = {
                  uid: userCredential.user.uid,
                  username: userData.username,
                  name: userData.name,
                  email: userData.email,
                  phone: userData.phone,
                  role: USER_ROLES.REGULAR,
                  createdAt: new Date().toISOString()
                };

                await addDoc(usersRef, newUser);

                alert('✅ נרשמת בהצלחה!\n\n📧 נשלח אליך מייל אימות.\nאנא אמת את המייל שלך לפני ההתחברות.\n\n⚠️ לא מצאת את המייל?\nבדוק גם בתיקיית Spam/דואר זבל!');
                
                return { success: true };
              } else {
                // Fallback to localStorage if Firebase not ready
                if (users.find(u => u.username === userData.username)) {
                  return { success: false, message: 'שם המשתמש כבר קיים' };
                }

                const newUser = {
                  id: Date.now().toString(),
                  ...userData,
                  role: USER_ROLES.REGULAR
                };

                setUsers(prev => [...prev, newUser]);
                
                const userWithoutPassword = { ...newUser };
                delete userWithoutPassword.password;
                setCurrentUser(userWithoutPassword);
                
                const logs = addActivityLog(LOG_TYPES.USER_REGISTER, newUser.id, newUser.name);
                setActivityLogs(logs);
                
                setCurrentView('home');
                
                return { success: true };
              }
            } catch (error) {
              console.error('Registration error:', error);
              return { success: false, message: 'שגיאה ברישום: ' + error.message };
            }
          };

          const toggleFavorite = async (id) => {
            if (!currentUser) {
              alert('נדרש להתחבר כדי להוסיף למועדפים');
              return;
            }

            const newFavorites = favorites.includes(id) 
              ? favorites.filter(fid => fid !== id) 
              : [...favorites, id];

            setFavorites(newFavorites);

            // Update in Firestore
            if (window.firebaseDB) {
              try {
                await updateDoc(doc(window.firebaseDB, 'users', currentUser.id), {
                  favorites: newFavorites
                });
              } catch (error) {
                console.error('Error updating favorites:', error);
              }
            }
          };

          const trackPropertyView = async (propertyId) => {
            // Track ALL views - both logged in and anonymous
            // But prevent counting the same view in the same session
            const sessionKey = `viewed_${propertyId}`;
            const alreadyViewed = sessionStorage.getItem(sessionKey);
            
            if (!alreadyViewed) {
              // Mark as viewed in this session
              sessionStorage.setItem(sessionKey, 'true');
              
              // Increment view count in Firestore
              if (window.firebaseDB) {
                try {
                  const propertyRef = window.firebaseDB.collection('properties').doc(propertyId);
                  const propertyDoc = await propertyRef.get();
                  
                  if (propertyDoc.exists) {
                    const currentViews = propertyDoc.data().views || 0;
                    await propertyRef.update({
                      views: currentViews + 1
                    });
                  }
                } catch (error) {
                  console.error('Error tracking view:', error);
                }
              }
              
              // Also update local state for immediate UI feedback
              setProperties(prev => prev.map(p => {
                if (p.id === propertyId) {
                  return {
                    ...p,
                    views: (p.views || 0) + 1
                  };
                }
                return p;
              }));
            }
          };

          const addProperty = async (newProperty) => {
            if (!currentUser) {
              alert('נדרש להתחבר כדי להוסיף נכס');
              return;
            }

            try {
              const now = new Date();
              const expiresAt = new Date(now.getTime() + 60 * 24 * 60 * 60 * 1000);

              // Generate property ID based on deal type
              let propertyId;
              if (window.firebaseDB) {
                // Get counter from Firestore
                const counterRef = doc(window.firebaseDB, 'counters', 'properties');
                const counterDoc = await counterRef.get();
                
                let nextId;
                if (counterDoc.exists) {
                  const counters = counterDoc.data();
                  if (newProperty.dealType === 'rent') {
                    nextId = counters.nextRentId || 1;
                    propertyId = `RNT${String(nextId).padStart(5, '0')}`;
                    await counterRef.update({ nextRentId: nextId + 1 });
                  } else {
                    nextId = counters.nextSaleId || 1;
                    propertyId = `SLE${String(nextId).padStart(5, '0')}`;
                    await counterRef.update({ nextSaleId: nextId + 1 });
                  }
                } else {
                  // Initialize counters
                  nextId = 1;
                  propertyId = newProperty.dealType === 'rent' ? 'RNT00001' : 'SLE00001';
                  await setDoc(counterRef, {
                    nextRentId: newProperty.dealType === 'rent' ? 2 : 1,
                    nextSaleId: newProperty.dealType === 'sale' ? 2 : 1
                  });
                }
              } else {
                // Fallback
                propertyId = newProperty.dealType === 'rent' ? 'RNT' + Date.now() : 'SLE' + Date.now();
              }

              const property = {
                ...newProperty,
                id: propertyId,
                userId: currentUser.id,
                createdAt: new Date().toISOString().split('T')[0],
                status: 'pending',
                views: 0,
                shares: 0,
                pinned: false,
                pinnedAt: null,
                pinnedBy: null,
                expiresAt: expiresAt.toISOString(),
                soldRented: false,
                soldRentedAt: null,
                rejectionReason: null
              };

              if (window.firebaseDB) {
                // Save to Firestore with custom ID
                await setDoc(doc(window.firebaseDB, 'properties', propertyId), property);
                
                // Add to local state
                setProperties(prev => [property, ...prev]);
              } else {
                // Fallback to localStorage
                setProperties(prev => [property, ...prev]);
              }
              
              const logs = addActivityLog(
                LOG_TYPES.PROPERTY_CREATE, 
                currentUser.id, 
                currentUser.name,
                { propertyId: property.id, propertyTitle: property.title, status: 'pending' }
              );
              setActivityLogs(logs);
              
              alert('✅ הנכס נשלח בהצלחה!\n\n⏳ הנכס שלך ממתין לאישור מנהל.\nנעדכן אותך ברגע שהנכס יאושר.\n\nזמן אישור ממוצע: 2-24 שעות');
              setCurrentView('my-properties');
            } catch (error) {
              console.error('Error adding property:', error);
              alert('שגיאה בשמירת הנכס: ' + error.message);
            }
          };

          const approveProperty = async (propertyId) => {
            if (currentUser?.role !== USER_ROLES.ADMIN) {
              alert('רק מנהל יכול לאשר נכסים');
              return;
            }

            try {
              const updateData = {
                status: 'active',
                approvedAt: new Date().toISOString(),
                approvedBy: currentUser.id
              };

              if (window.firebaseDB) {
                await updateDoc(doc(window.firebaseDB, 'properties', propertyId), updateData);
              }

              setProperties(prev => prev.map(p => 
                p.id === propertyId ? { ...p, ...updateData } : p
              ));

              const property = properties.find(p => p.id === propertyId);
              const logs = addActivityLog(
                LOG_TYPES.PROPERTY_EDIT,
                currentUser.id,
                currentUser.name,
                { propertyId, propertyTitle: property?.title, action: 'approve' }
              );
              setActivityLogs(logs);
            } catch (error) {
              console.error('Error approving property:', error);
              alert('שגיאה באישור הנכס');
            }
          };

          const rejectProperty = async (propertyId, reason) => {
            if (currentUser?.role !== USER_ROLES.ADMIN) {
              alert('רק מנהל יכול לדחות נכסים');
              return;
            }

            try {
              const updateData = {
                status: 'rejected',
                rejectedAt: new Date().toISOString(),
                rejectedBy: currentUser.id,
                rejectionReason: reason
              };

              if (window.firebaseDB) {
                await updateDoc(doc(window.firebaseDB, 'properties', propertyId), updateData);
              }

              setProperties(prev => prev.map(p => 
                p.id === propertyId ? { ...p, ...updateData } : p
              ));

              const property = properties.find(p => p.id === propertyId);
              const logs = addActivityLog(
                LOG_TYPES.PROPERTY_EDIT,
                currentUser.id,
                currentUser.name,
                { propertyId, propertyTitle: property?.title, action: 'reject', reason }
              );
              setActivityLogs(logs);
            } catch (error) {
              console.error('Error rejecting property:', error);
              alert('שגיאה בדחיית הנכס');
            }
          };

          const togglePinProperty = (propertyId) => {
            if (currentUser?.role !== USER_ROLES.ADMIN) {
              alert('רק מנהל יכול לנעוץ נכסים');
              return;
            }

            setProperties(prev => prev.map(p => {
              if (p.id === propertyId) {
                const newPinnedState = !p.pinned;
                return {
                  ...p,
                  pinned: newPinnedState,
                  pinnedAt: newPinnedState ? new Date().toISOString() : null,
                  pinnedBy: newPinnedState ? currentUser.id : null
                };
              }
              return p;
            }));

            const property = properties.find(p => p.id === propertyId);
            const logs = addActivityLog(
              LOG_TYPES.PROPERTY_EDIT,
              currentUser.id,
              currentUser.name,
              { 
                propertyId, 
                propertyTitle: property?.title,
                action: property?.pinned ? 'unpin' : 'pin'
              }
            );
            setActivityLogs(logs);
          };

          // Mark property as sold/rented
          const markPropertySoldRented = (propertyId) => {
            const property = properties.find(p => p.id === propertyId);
            
            if (property.userId !== currentUser?.id && currentUser?.role !== USER_ROLES.ADMIN) {
              alert('אין לך הרשאה לעדכן נכס זה');
              return;
            }

            const newStatus = !property.soldRented;
            
            setProperties(prev => prev.map(p => 
              p.id === propertyId ? { 
                ...p, 
                soldRented: newStatus,
                soldRentedAt: newStatus ? new Date().toISOString() : null,
                status: newStatus ? 'sold_rented' : 'active'
              } : p
            ));

            const logs = addActivityLog(
              LOG_TYPES.PROPERTY_EDIT,
              currentUser.id,
              currentUser.name,
              { 
                propertyId, 
                propertyTitle: property?.title,
                action: newStatus ? 'mark_sold_rented' : 'unmark_sold_rented'
              }
            );
            setActivityLogs(logs);
          };

          // Check property expiration
          const checkPropertyExpiration = (property) => {
            if (!property.expiresAt) return { expired: false, warning: false, daysLeft: 60 };
            
            const now = new Date();
            const expiresAt = new Date(property.expiresAt);
            const daysUntilExpire = Math.ceil((expiresAt - now) / (1000 * 60 * 60 * 24));
            
            return {
              expired: daysUntilExpire <= 0,
              warning: daysUntilExpire > 0 && daysUntilExpire <= 7,
              daysLeft: daysUntilExpire
            };
          };

          // Renew property for 60 more days
          const renewProperty = (propertyId) => {
            const property = properties.find(p => p.id === propertyId);
            
            if (property.userId !== currentUser?.id && currentUser?.role !== USER_ROLES.ADMIN) {
              alert('אין לך הרשאה לחדש נכס זה');
              return;
            }

            const newExpiresAt = new Date(Date.now() + 60 * 24 * 60 * 60 * 1000);

            setProperties(prev => prev.map(p => 
              p.id === propertyId ? { 
                ...p, 
                expiresAt: newExpiresAt.toISOString(),
                status: 'active'
              } : p
            ));

            alert('המודעה חודשה ל-60 יום נוספים!');
            
            const logs = addActivityLog(
              LOG_TYPES.PROPERTY_EDIT,
              currentUser.id,
              currentUser.name,
              { propertyId, propertyTitle: property?.title, action: 'renew' }
            );
            setActivityLogs(logs);
          };

          // Smart sorting algorithm - 3 layers
          const smartSortProperties = (properties) => {
            const now = new Date();
            const sevenDaysAgo = new Date(now - 7 * 24 * 60 * 60 * 1000);

            // Layer 1: Pinned properties (always on top, sorted by pinned date)
            const pinned = properties
              .filter(p => p.pinned)
              .sort((a, b) => new Date(b.pinnedAt) - new Date(a.pinnedAt));

            // Layer 2: Hot properties (new or popular - last 7 days or high views)
            const hot = properties
              .filter(p => !p.pinned)
              .filter(p => {
                const isNew = new Date(p.createdAt) >= sevenDaysAgo;
                const isPopular = (p.views || 0) >= 10;
                return isNew || isPopular;
              })
              .sort((a, b) => {
                // Mix of views and recency
                const scoreA = (a.views || 0) * 0.7 + (new Date(a.createdAt) >= sevenDaysAgo ? 30 : 0);
                const scoreB = (b.views || 0) * 0.7 + (new Date(b.createdAt) >= sevenDaysAgo ? 30 : 0);
                return scoreB - scoreA;
              });

            // Layer 3: Regular properties (weighted random)
            const regular = properties
              .filter(p => !p.pinned)
              .filter(p => {
                const isNew = new Date(p.createdAt) >= sevenDaysAgo;
                const isPopular = (p.views || 0) >= 10;
                return !isNew && !isPopular;
              })
              .map(p => {
                // Calculate weight - older properties and low-view properties get higher weight
                const daysSinceCreated = Math.floor((now - new Date(p.createdAt)) / (1000 * 60 * 60 * 24));
                const viewWeight = Math.max(1, 20 - (p.views || 0)); // Less views = higher weight
                const ageWeight = Math.min(daysSinceCreated / 10, 10); // Older = higher weight
                
                return {
                  ...p,
                  weight: viewWeight + ageWeight + Math.random() * 5
                };
              })
              .sort((a, b) => b.weight - a.weight);

            return [...pinned, ...hot, ...regular];
          };

          const updateProperty = (propertyId, updatedData) => {
            if (!currentUser) {
              alert('נדרש להתחבר');
              return;
            }

            const property = properties.find(p => p.id === propertyId);
            
            // Check permissions
            if (property.userId !== currentUser.id && currentUser.role !== USER_ROLES.ADMIN) {
              alert('אין לך הרשאה לערוך נכס זה');
              return;
            }

            setProperties(prev => prev.map(p => 
              p.id === propertyId ? { ...p, ...updatedData } : p
            ));
            
            // Log activity
            const logs = addActivityLog(
              LOG_TYPES.PROPERTY_EDIT, 
              currentUser.id, 
              currentUser.name,
              { propertyId, propertyTitle: property.title }
            );
            setActivityLogs(logs);
            
            setEditingProperty(null);
            setCurrentView('my-properties');
          };

          const deleteProperty = async (id) => {
            const property = properties.find(p => p.id === id);
            
            if (property.userId !== currentUser?.id && currentUser?.role !== USER_ROLES.ADMIN) {
              alert('אין לך הרשאה למחוק נכס זה');
              return;
            }

            if (confirm('האם אתה בטוח שברצונך למחוק את הנכס?')) {
              try {
                if (window.firebaseDB) {
                  // Delete from Firestore
                  await deleteDoc(doc(window.firebaseDB, 'properties', id));
                }
                
                setProperties(prev => prev.filter(p => p.id !== id));
                
                const logs = addActivityLog(
                  LOG_TYPES.PROPERTY_DELETE, 
                  currentUser.id, 
                  currentUser.name,
                  { propertyId: id, propertyTitle: property.title }
                );
                setActivityLogs(logs);
              } catch (error) {
                console.error('Error deleting property:', error);
                alert('שגיאה במחיקת הנכס');
              }
            }
          };

          const editProperty = async (id, updatedData) => {
            const property = properties.find(p => p.id === id);
            
            if (property.userId !== currentUser?.id && currentUser?.role !== USER_ROLES.ADMIN) {
              alert('אין לך הרשאה לערוך נכס זה');
              return;
            }

            try {
              if (window.firebaseDB) {
                // Update in Firestore
                await updateDoc(doc(window.firebaseDB, 'properties', id), updatedData);
              }

              setProperties(prev => prev.map(p => 
                p.id === id ? { ...p, ...updatedData } : p
              ));
              
              const logs = addActivityLog(
                LOG_TYPES.PROPERTY_EDIT, 
                currentUser.id, 
                currentUser.name,
                { propertyId: id, propertyTitle: property.title }
              );
              setActivityLogs(logs);
            } catch (error) {
              console.error('Error updating property:', error);
              alert('שגיאה בעדכון הנכס');
            }
          };

          // User Management (Admin only)
          const createUser = (userData) => {
            if (currentUser?.role !== USER_ROLES.ADMIN) {
              alert('רק מנהל יכול ליצור משתמשים');
              return { success: false, message: 'אין הרשאה' };
            }

            if (users.find(u => u.username === userData.username)) {
              return { success: false, message: 'שם המשתמש כבר קיים' };
            }

            const newUser = {
              id: Date.now().toString(),
              ...userData
            };

            setUsers(prev => [...prev, newUser]);
            
            // Log activity
            const logs = addActivityLog(
              LOG_TYPES.USER_CREATE, 
              currentUser.id, 
              currentUser.name,
              { newUserId: newUser.id, newUserName: newUser.name, role: newUser.role }
            );
            setActivityLogs(logs);
            
            return { success: true };
          };

          const updateUser = async (userId, updatedData) => {
            if (currentUser?.role !== USER_ROLES.ADMIN) {
              alert('רק מנהל יכול לערוך משתמשים');
              return { success: false };
            }

            try {
              const user = users.find(u => u.id === userId);
              
              // Update in Firestore
              if (window.firebaseDB) {
                await updateDoc(doc(window.firebaseDB, 'users', userId), updatedData);
              }

              // Update local state
              setUsers(prev => prev.map(u => 
                u.id === userId ? { ...u, ...updatedData } : u
              ));
              
              // Log activity
              const logs = addActivityLog(
                LOG_TYPES.USER_EDIT, 
                currentUser.id, 
                currentUser.name,
                { editedUserId: userId, editedUserName: user?.name || 'משתמש', changes: updatedData }
              );
              setActivityLogs(logs);
              
              return { success: true };
            } catch (error) {
              console.error('Error updating user:', error);
              alert('שגיאה בעדכון משתמש');
              return { success: false };
            }
          };

          const deleteUser = (userId) => {
            if (currentUser?.role !== USER_ROLES.ADMIN) {
              alert('רק מנהל יכול למחוק משתמשים');
              return;
            }

            if (userId === currentUser.id) {
              alert('לא ניתן למחוק את עצמך');
              return;
            }

            const user = users.find(u => u.id === userId);
            if (confirm(`האם אתה בטוח שברצונך למחוק את המשתמש ${user?.name}?`)) {
              setUsers(prev => prev.filter(u => u.id !== userId));
              
              // Log activity
              const logs = addActivityLog(
                LOG_TYPES.USER_DELETE, 
                currentUser.id, 
                currentUser.name,
                { deletedUserId: userId, deletedUserName: user?.name || 'משתמש' }
              );
              setActivityLogs(logs);
            }
          };

          // Export to CSV
          const exportToCSV = (data, filename) => {
            const headers = Object.keys(data[0] || {});
            const csvContent = [
              headers.join(','),
              ...data.map(row => 
                headers.map(header => {
                  const value = row[header];
                  // Escape commas and quotes
                  if (typeof value === 'string' && (value.includes(',') || value.includes('"'))) {
                    return `"${value.replace(/"/g, '""')}"`;
                  }
                  return value;
                }).join(',')
              )
            ].join('\n');

            const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
          };

          // Export properties list
          const exportPropertiesList = () => {
            if (currentUser?.role !== USER_ROLES.ADMIN) {
              alert('רק מנהל יכול לייצא רשימות');
              return;
            }

            const exportData = properties.map(p => ({
              'מזהה': p.id,
              'כותרת': p.title,

              'עיר': p.city,
              'שכונה': p.neighborhood,
              'כתובת': p.address,
              'חדרים': p.rooms,
              'גודל מ״ר': p.size,
              'קומה': p.floor || '',
              'צפיות': p.views || 0,
              'נעוץ': p.pinned ? 'כן' : 'לא',
              'סטטוס': p.status === 'active' ? 'פעיל' : 'לא פעיל',
              'תאריך פרסום': formatDate(p.createdAt),
              'שם מפרסם': p.contact?.name || '',
              'טלפון': p.contact?.phone || ''
            }));

            exportToCSV(exportData, `properties-${new Date().toISOString().split('T')[0]}.csv`);
          };

          // Export users list
          const exportUsersList = () => {
            if (currentUser?.role !== USER_ROLES.ADMIN) {
              alert('רק מנהל יכול לייצא רשימות');
              return;
            }

            const exportData = users.map(u => ({
              'מזהה': u.id,
              'שם': u.name,
              'שם משתמש': u.username,
              'אימייל': u.email,
              'טלפון': u.phone,
              'תפקיד': u.role === 'admin' ? 'מנהל' : u.role === 'agent' ? 'מתווך' : 'משתמש'
            }));

            exportToCSV(exportData, `users-${new Date().toISOString().split('T')[0]}.csv`);
          };

          // Render functions would continue here with the same logic as the JSX file
          // Due to length, I'll create a simplified version that works in the browser

          return (
            <div className="min-h-screen bg-gray-50" dir="rtl">
              <Header 
                currentView={currentView}
                setCurrentView={setCurrentView}
                favorites={favorites}
                userMode={userMode}
                setUserMode={setUserMode}
                currentUser={currentUser}
                onLogout={handleLogout}
                properties={properties}
              />
              
              {currentView === 'login' && (
                <LoginPage 
                  onLogin={handleLogin} 
                  onSwitchToRegister={() => setCurrentView('register')}
                  onForgotPassword={() => setCurrentView('forgot-password')}
                />
              )}
              
              {currentView === 'register' && (
                <RegisterPage onRegister={handleRegister} onSwitchToLogin={() => setCurrentView('login')} />
              )}
              
              {currentView === 'forgot-password' && (
                <ForgotPasswordPage />
              )}
              
              {currentView === 'home' && (
                <HomePage 
                  properties={properties}
                  favorites={favorites}
                  toggleFavorite={toggleFavorite}
                  setCurrentView={setCurrentView}
                  setSelectedProperty={setSelectedProperty}
                  filters={filters}
                  setFilters={setFilters}
                  currentUser={currentUser}
                  smartSort={smartSortProperties}
                />
              )}
              
              {currentView === 'search' && (
                <SearchPage
                  filteredProperties={filteredProperties}
                  favorites={favorites}
                  toggleFavorite={toggleFavorite}
                  setSelectedProperty={setSelectedProperty}
                  setCurrentView={setCurrentView}
                  filters={filters}
                  setFilters={setFilters}
                  viewMode={viewMode}
                  setViewMode={setViewMode}
                  showFilters={showFilters}
                  setShowFilters={setShowFilters}
                  smartSort={smartSortProperties}
                />
              )}
              
              {currentView === 'property-detail' && selectedProperty && (
                <PropertyDetail 
                  property={selectedProperty}
                  onBack={() => setCurrentView('search')}
                  trackView={trackPropertyView}
                  currentUser={currentUser}
                />
              )}
              
              {currentView === 'favorites' && (
                <FavoritesPage
                  properties={properties}
                  favorites={favorites}
                  toggleFavorite={toggleFavorite}
                  setSelectedProperty={setSelectedProperty}
                  setCurrentView={setCurrentView}
                />
              )}
              
              {currentView === 'my-properties' && (
                <MyPropertiesPage
                  properties={properties}
                  currentUser={currentUser}
                  deleteProperty={deleteProperty}
                  setCurrentView={setCurrentView}
                  onEditProperty={setEditingProperty}
                  togglePinProperty={togglePinProperty}
                  exportPropertiesList={exportPropertiesList}
                  markPropertySoldRented={markPropertySoldRented}
                  checkPropertyExpiration={checkPropertyExpiration}
                  renewProperty={renewProperty}
                />
              )}
              
              {currentView === 'add-property' && (
                <AddPropertyPage
                  currentUser={currentUser}
                  onSubmit={addProperty}
                  onCancel={() => setCurrentView('my-properties')}
                />
              )}
              
              {currentView === 'edit-property' && editingProperty && (
                <AddPropertyPage
                  currentUser={currentUser}
                  initialData={editingProperty}
                  onSubmit={(updatedData) => updateProperty(editingProperty.id, updatedData)}
                  onCancel={() => {
                    setEditingProperty(null);
                    setCurrentView('my-properties');
                  }}
                />
              )}
              
              {currentView === 'user-management' && (
                <UserManagementPage
                  currentUser={currentUser}
                  users={users}
                  onCreateUser={createUser}
                  onUpdateUser={updateUser}
                  onDeleteUser={deleteUser}
                  setCurrentView={setCurrentView}
                  onExportUsers={exportUsersList}
                />
              )}
              
              {currentView === 'activity-logs' && (
                <ActivityLogsPage
                  currentUser={currentUser}
                  logs={activityLogs}
                  users={users}
                  properties={properties}
                  setCurrentView={setCurrentView}
                />
              )}
              
              {currentView === 'about' && (
                <AboutPage setCurrentView={setCurrentView} />
              )}
              
              {currentView === 'contact' && (
                <ContactPage setCurrentView={setCurrentView} />
              )}
              
              {currentView === 'terms' && (
                <TermsPage setCurrentView={setCurrentView} />
              )}
              
              {currentView === 'privacy' && (
                <PrivacyPage setCurrentView={setCurrentView} />
              )}
              
              {currentView === 'pending-properties' && currentUser?.role === 'admin' && (
                <PendingPropertiesPage 
                  properties={properties}
                  currentUser={currentUser}
                  approveProperty={approveProperty}
                  rejectProperty={rejectProperty}
                  setCurrentView={setCurrentView}
                  setSelectedProperty={setSelectedProperty}
                />
              )}
              
              {/* Footer */}
              <footer className="bg-gray-900 text-white py-12 mt-16">
                <div className="max-w-7xl mx-auto px-4">
                  <div className="grid grid-cols-1 md:grid-cols-4 gap-8 mb-8">
                    <div>
                      <h3 className="text-2xl font-bold mb-4">נדלן מרקט</h3>
                      <p className="text-gray-400 mb-4">הפורטל המוביל לנדל"ן בישראל</p>
                      <p className="text-sm text-gray-500">מבית ITMO</p>
                    </div>
                    <div>

        const MyPropertiesPage = ({ properties, currentUser, deleteProperty, setCurrentView, onEditProperty, togglePinProperty, exportPropertiesList, markPropertySoldRented, checkPropertyExpiration, renewProperty }) => {
          const [selectedProperties, setSelectedProperties] = useState([]);
          const [sortBy, setSortBy] = useState('date'); // date, city, price, views
          const [sortOrder, setSortOrder] = useState('desc'); // asc, desc

          // Sort properties
          const sortedProperties = [...myProperties].sort((a, b) => {
            let comparison = 0;
            
            switch(sortBy) {
              case 'date':
                comparison = new Date(b.createdAt) - new Date(a.createdAt);
                break;
              case 'city':
                comparison = a.city.localeCompare(b.city, 'he');

              case 'price':
                comparison = a.price - b.price;
                break;
              case 'views':
                comparison = (b.views || 0) - (a.views || 0);

                comparison = 0;
            }
            
            return sortOrder === 'asc' ? -comparison : comparison;

                        {canEdit && (

                            {/* Renew button if expiring soon */}
                            {(() => {

                              return expStatus && (expStatus.warning || expStatus.expired) && (
                                <button 
                                  onClick={() => renewProperty && renewProperty(property.id)}
                                  className="p-2 bg-orange-500 text-white rounded-lg hover:bg-orange-600 transition"
                                  title={`נותרו ${expStatus.daysLeft} ימים - חדש כאן`}

                        {/* Expiration Warning Badge */}

        const AddPropertyPage = ({ currentUser, onSubmit, onCancel, initialData = null }) => {
          const isEditMode = !!initialData;
          
          if (!currentUser) {
            return (
              <div className="max-w-7xl mx-auto px-4 py-8">
                <div className="text-center py-16 bg-gray-50 rounded-lg">

          const [formData, setFormData] = useState(initialData ? {
            title: initialData.title || '',
            type: initialData.type || 'apartment',
            dealType: initialData.dealType || 'sale',
            price: initialData.price || '',
            city: initialData.city || '',
            neighborhood: initialData.neighborhood || '',
            address: initialData.address || '',
            rooms: initialData.rooms || '',
            bedrooms: initialData.bedrooms || '',
            size: initialData.size || '',
            floor: initialData.floor !== null ? initialData.floor : '',
            totalFloors: initialData.totalFloors || '',
            description: initialData.description || '',
            features: initialData.features || [],
            nearTransport: initialData.nearTransport || false,
            contact: initialData.contact || {
              name: currentUser.name,
              phone: currentUser.phone,
              type: currentUser.role === 'agent' ? 'agent' : 'owner'
            }
          } : {
            title: '',
            type: 'apartment',
            dealType: 'sale',
            price: '',
            city: '',
            neighborhood: '',
            address: '',
            rooms: '',
            bedrooms: '',
            size: '',
            floor: '',
            totalFloors: '',
            description: '',
            features: [],
            nearTransport: false,
            contact: {
              name: currentUser.name,
              phone: currentUser.phone,
              type: currentUser.role === 'agent' ? 'agent' : 'owner'
            },
            images: []
          });

          const [uploadedImages, setUploadedImages] = useState(initialData?.images || []);
          const [isUploading, setIsUploading] = useState(false);

          const handleImageUpload = async (e, index) => {
            const file = e.target.files[0];
            if (!file) return;

            // Check file size (max 5MB)
            if (file.size > 5 * 1024 * 1024) {
              alert('גודל התמונה חייב להיות פחות מ-5MB');
              return;
            }

            // Check file type
            if (!file.type.startsWith('image/')) {
              alert('נא להעלות קובץ תמונה בלבד');
              return;
            }

            setIsUploading(true);

            try {
              const reader = new FileReader();
              reader.onload = (event) => {
                // Compress image before saving
                const img = new Image();
                img.onload = () => {
                  const canvas = document.createElement('canvas');
                  let width = img.width;
                  let height = img.height;
                  
                  // Max dimensions to keep file size reasonable
                  const MAX_WIDTH = 1200;
                  const MAX_HEIGHT = 1200;
                  
                  if (width > height) {
                    if (width > MAX_WIDTH) {
                      height *= MAX_WIDTH / width;
                      width = MAX_WIDTH;
                    }
                  } else {
                    if (height > MAX_HEIGHT) {
                      width *= MAX_HEIGHT / height;
                      height = MAX_HEIGHT;
                    }
                  }
                  
                  canvas.width = width;
                  canvas.height = height;
                  const ctx = canvas.getContext('2d');
                  ctx.drawImage(img, 0, 0, width, height);
                  
                  // Compress to JPEG with 0.7 quality (good balance)
                  const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                  
                  // Check final size
                  const sizeInKB = Math.round((compressedDataUrl.length * 3) / 4 / 1024);
                  
                  if (sizeInKB > 400) {
                    // If still too large, compress more
                    const moreCompressed = canvas.toDataURL('image/jpeg', 0.5);
                    
                    const newImages = [...uploadedImages];
                    newImages[index] = moreCompressed;
                    setUploadedImages(newImages);
                  } else {
                    const newImages = [...uploadedImages];
                    newImages[index] = compressedDataUrl;
                    setUploadedImages(newImages);
                  }
                  
                  setIsUploading(false);
                };
                img.onerror = () => {
                  alert('שגיאה בעיבוד התמונה');
                  setIsUploading(false);
                };
                img.src = event.target.result;
              };
              reader.onerror = () => {
                alert('שגיאה בהעלאת התמונה');
                setIsUploading(false);
              };
              reader.readAsDataURL(file);
            } catch (error) {
              alert('שגיאה בהעלאת התמונה');
              setIsUploading(false);
            }
          };

          const removeImage = (index) => {
            const newImages = [...uploadedImages];
            newImages.splice(index, 1);
            setUploadedImages(newImages);
          };

          const handleSubmit = (e) => {
            e.preventDefault();
            
            if (uploadedImages.length === 0) {
              alert('נא להעלות לפחות תמונה אחת');
              return;

              images: uploadedImages,
              lat: 32.0853 + (Math.random() - 0.5) * 0.1,
              lng: 34.7818 + (Math.random() - 0.5) * 0.1
            });
          };

          return (
