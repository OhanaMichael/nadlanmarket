                <h2 className="text-3xl font-bold text-gray-900 mb-6">
                  {isEditMode ? '✏️ ערוך נכס' : 'פרסם נכס חדש'}
                </h2>
                
                {isEditMode && (
                  <div className="mb-6 p-3 bg-blue-50 border border-blue-200 rounded-lg">
                    <p className="text-sm text-blue-700">
                      אתה עורך את: <strong>{initialData.title}</strong>
                    </p>
                  </div>
                )}
                
                <form onSubmit={handleSubmit} className="space-y-6">
                  <div>
                    <label className="block text-sm font-medium mb-2">כותרת הנכס *</label>
                    <input
                      type="text"
                      required
                      className="w-full p-3 border rounded-lg"
                      placeholder="לדוגמה: דירת 4 חדרים משופצת בלב העיר"
                      value={formData.title}
                      onChange={(e) => setFormData({...formData, title: e.target.value})}
                    />
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm font-medium mb-2">סוג עסקה *</label>
                      <select
                        required
                        className="w-full p-3 border rounded-lg"
                        value={formData.dealType}
                        onChange={(e) => setFormData({...formData, dealType: e.target.value})}
                      >
                        <option value="sale">מכירה</option>
                        <option value="rent">השכרה</option>
                      </select>
                    </div>

                    <div>
                      <label className="block text-sm font-medium mb-2">מחיר *</label>
                      <input
                        type="number"
                        required
                        className="w-full p-3 border rounded-lg"
                        value={formData.price}
                        onChange={(e) => setFormData({...formData, price: e.target.value})}
                      />
                    </div>
                  </div>

                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm font-medium mb-2">עיר *</label>
                      <CityAutocomplete
                        value={formData.city}
                        onChange={(city) => setFormData({...formData, city})}
                        required={true}
                      />
                    </div>

                    <div>
                      <label className="block text-sm font-medium mb-2">שכונה *</label>
                      <input
                        type="text"
                        required
                        className="w-full p-3 border rounded-lg"
                        value={formData.neighborhood}
                        onChange={(e) => setFormData({...formData, neighborhood: e.target.value})}
                      />
                    </div>
                  </div>

                  <div className="grid grid-cols-3 gap-4">
                    <div>
                      <label className="block text-sm font-medium mb-2">חדרים *</label>
                      <input
                        type="number"
                        step="0.5"
                        required
                        className="w-full p-3 border rounded-lg"
                        value={formData.rooms}
                        onChange={(e) => setFormData({...formData, rooms: e.target.value})}
                      />
                    </div>

                    <div>
                      <label className="block text-sm font-medium mb-2">חדרי שינה *</label>
                      <input
                        type="number"
                        required
                        className="w-full p-3 border rounded-lg"
                        value={formData.bedrooms}
                        onChange={(e) => setFormData({...formData, bedrooms: e.target.value})}
                      />
                    </div>

                    <div>
                      <label className="block text-sm font-medium mb-2">שטח (מ״ר) *</label>
                      <input
                        type="number"
                        required
                        className="w-full p-3 border rounded-lg"
                        value={formData.size}
                        onChange={(e) => setFormData({...formData, size: e.target.value})}
                      />
                    </div>
                  </div>

                  <div>
                    <label className="block text-sm font-medium mb-2">תיאור הנכס *</label>
                    <textarea
                      required
                      rows="6"
                      className="w-full p-3 border rounded-lg"
                      value={formData.description}
                      onChange={(e) => setFormData({...formData, description: e.target.value})}
                    />
                  </div>

                  <div className="space-y-4">
                    <h3 className="text-lg font-bold text-gray-900 border-b pb-2">תמונות הנכס</h3>
                    <p className="text-sm text-gray-600">העלה תמונות של הנכס (לפחות תמונה אחת, מומלץ 3-5 תמונות)</p>
                    
                    {/* Uploaded Images Preview */}
                    {uploadedImages.length > 0 && (
                      <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                        {uploadedImages.map((image, index) => (
                          <div key={index} className="relative group">
                            <img
                              src={image}
                              alt={`תמונה ${index + 1}`}
                              className="w-full h-32 object-cover rounded-lg border-2 border-blue-500"
                            />
                            <button
                              type="button"
                              onClick={() => removeImage(index)}
                              className="absolute top-2 left-2 p-1 bg-red-500 text-white rounded-full opacity-0 group-hover:opacity-100 transition"
                            >
                              <Icon name="X" className="w-4 h-4" />
                            </button>
                            <div className="absolute bottom-2 right-2 px-2 py-1 bg-black/60 text-white text-xs rounded">
                              תמונה {index + 1}
                            </div>
                          </div>
                        ))}
                      </div>
                    )}

                    {/* Upload Button */}
                    <div className="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:border-blue-500 transition">
                      <input
                        type="file"
                        accept="image/*"
                        onChange={(e) => handleImageUpload(e, uploadedImages.length)}
                        className="hidden"
                        id="image-upload"
                        disabled={isUploading}
                      />
                      <label
                        htmlFor="image-upload"
                        className={`cursor-pointer flex flex-col items-center ${isUploading ? 'opacity-50' : ''}`}
                      >
                        {isUploading ? (
                          <>
                            <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                            <p className="text-gray-600">מעלה תמונה...</p>
                          </>
                        ) : (
                          <>
                            <div className="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mb-4">
                              <Icon name="Plus" className="w-8 h-8 text-blue-600" />
                            </div>
                            <p className="text-lg font-semibold text-gray-700 mb-2">
                              לחץ להעלאת תמונה
                            </p>
                            <p className="text-sm text-gray-500">
                              JPG, PNG, WEBP עד 5MB
                            </p>
                            {uploadedImages.length === 0 && (
                              <p className="text-xs text-red-500 mt-2">
                                * נדרשת לפחות תמונה אחת
                              </p>
                            )}
                          </>
                        )}
                      </label>
                    </div>

                    <p className="text-xs text-gray-500 text-center">
                      💡 טיפ: תמונות איכותיות יעזרו למכור/להשכיר את הנכס מהר יותר
                    </p>
                  </div>

                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm font-medium mb-2">שם מלא</label>
                      <input
                        type="text"
                        disabled
                        className="w-full p-3 border rounded-lg bg-gray-50"
                        value={formData.contact.name}
                      />
                      <p className="text-xs text-gray-500 mt-1">נלקח מהפרופיל שלך</p>
                    </div>

                    <div>
                      <label className="block text-sm font-medium mb-2">טלפון</label>
                      <input
                        type="tel"
                        disabled
                        className="w-full p-3 border rounded-lg bg-gray-50"
                        value={formData.contact.phone}
                      />
                      <p className="text-xs text-gray-500 mt-1">נלקח מהפרופיל שלך</p>
                    </div>
                  </div>

                  <div className="flex gap-4 pt-6 border-t">
                    <button
                      type="submit"
                      className="flex-1 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-semibold"
                    >
                      {isEditMode ? 'שמור שינויים' : 'פרסם נכס'}
                    </button>
                    <button
                      type="button"
                      onClick={onCancel}
                      className="px-8 py-3 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition"
                    >
                      ביטול
                    </button>
                  </div>
                </form>
              </div>
            </div>
          );
        };

        // ========== USER MANAGEMENT PAGE ==========
        const UserManagementPage = ({ currentUser, users, onCreateUser, onUpdateUser, onDeleteUser, setCurrentView, onExportUsers }) => {
          const [showCreateModal, setShowCreateModal] = useState(false);
          const [searchQuery, setSearchQuery] = useState('');

          if (currentUser?.role !== 'admin') {
            return (
              <div className="max-w-7xl mx-auto px-4 py-8">
                <div className="text-center py-16 bg-red-50 rounded-lg">
                  <p className="text-xl text-red-600 mb-4">אין לך הרשאה לצפות בעמוד זה</p>
                  <button
                    onClick={() => setCurrentView('home')}
                    className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition"
                  >
                    חזרה לעמוד הבית
                  </button>
                </div>
              </div>
            );
          }

          const filteredUsers = users.filter(user => {
            if (!searchQuery) return true;
            const query = searchQuery.toLowerCase();
            return (
              user.name.toLowerCase().includes(query) ||
              user.username.toLowerCase().includes(query) ||
              user.email.toLowerCase().includes(query) ||
              user.phone.includes(query)
            );
          });

          return (
            <div className="max-w-7xl mx-auto px-4 py-8">
              <div className="flex items-center justify-between mb-8">
                <div>
                  <h2 className="text-3xl font-bold text-gray-900">👥 ניהול משתמשים</h2>
                  <p className="text-gray-600 mt-1">סה״כ {users.length} משתמשים ({filteredUsers.length} מוצגים)</p>
                </div>
                <div className="flex gap-2">
                  <button
                    onClick={onExportUsers}
                    className="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition flex items-center gap-2"
                  >
                    <Icon name="Download" className="w-5 h-5" />
                    ייצא לCSV
                  </button>
                  <button
                    onClick={() => setShowCreateModal(true)}
                    className="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition flex items-center gap-2"
                  >
                    <Icon name="Plus" className="w-5 h-5" />
                    הוסף משתמש חדש
                  </button>
                </div>
              </div>

              <div className="mb-6">
                <div className="relative">
                  <Icon name="Search" className="absolute right-3 top-3 w-5 h-5 text-gray-400" />
                  <input
                    type="text"
                    placeholder="חפש לפי שם, שם משתמש, אימייל או טלפון..."
                    className="w-full pr-10 p-3 border rounded-lg"
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                  />
                  {searchQuery && (
                    <button
                      onClick={() => setSearchQuery('')}
                      className="absolute left-3 top-3 text-gray-400 hover:text-gray-600"
                    >
                      <Icon name="X" className="w-5 h-5" />
                    </button>
                  )}
                </div>
              </div>

              <div className="grid gap-4">
                {filteredUsers.map(user => (
                  <div key={user.id} className="bg-white rounded-lg border p-4 flex items-center justify-between">
                    <div className="flex items-center gap-4">
                      <div className="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                        <span className="text-2xl">
                          {user.role === 'admin' ? '👑' : user.role === 'agent' ? '🏢' : '👤'}
                        </span>
                      </div>
                      <div>
                        <h3 className="font-bold text-lg">{user.name}</h3>
                        <p className="text-sm text-gray-600">@{user.username}</p>
                        <p className="text-xs text-gray-500">{user.email} • {user.phone}</p>
                      </div>
                    </div>
                    
                    <div className="flex items-center gap-4">
                      <select
                        value={user.role}
                        onChange={(e) => onUpdateUser(user.id, { role: e.target.value })}
                        className="p-2 border rounded-lg text-sm"
                        disabled={user.id === currentUser.id}
                      >
                        <option value="regular">👤 משתמש רגיל</option>
                        <option value="agent">🏢 מתווך</option>
                        <option value="admin">👑 מנהל</option>
                      </select>
                      
                      {user.id !== currentUser.id && (
                        <button
                          onClick={() => onDeleteUser(user.id)}
                          className="p-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 transition"
                        >
                          <Icon name="Trash2" className="w-5 h-5" />
                        </button>
                      )}
                    </div>
                  </div>
                ))}
              </div>

              {showCreateModal && (
                <CreateUserModal
                  onClose={() => setShowCreateModal(false)}
                  onCreate={onCreateUser}
                />
              )}
            </div>
          );
        };

        const CreateUserModal = ({ onClose, onCreate }) => {
          const [formData, setFormData] = useState({
            username: '',
            password: '',
            name: '',
            email: '',
            phone: '',
            role: 'regular'
          });
          const [error, setError] = useState('');

          const handleSubmit = (e) => {
            e.preventDefault();
            const result = onCreate(formData);
            if (result.success) {
              onClose();
            } else {
              setError(result.message);
            }
          };

          return (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl p-8 w-full max-w-md max-h-[90vh] overflow-y-auto">
                <div className="flex items-center justify-between mb-6">
                  <h3 className="text-2xl font-bold">הוסף משתמש חדש</h3>
                  <button onClick={onClose} className="p-2 hover:bg-gray-100 rounded-full">
                    <Icon name="X" className="w-5 h-5" />
                  </button>
                </div>

                {error && (
                  <div className="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
                    {error}
                  </div>
                )}

                <form onSubmit={handleSubmit} className="space-y-4">
                  <div>
                    <label className="block text-sm font-medium mb-2">שם מלא *</label>
                    <input
                      type="text"
                      required
                      className="w-full p-3 border rounded-lg"
                      value={formData.name}
                      onChange={(e) => setFormData({...formData, name: e.target.value})}
                    />
                  </div>

                  <div>
                    <label className="block text-sm font-medium mb-2">שם משתמש *</label>
                    <input
                      type="text"
                      required
                      className="w-full p-3 border rounded-lg"
                      value={formData.username}
                      onChange={(e) => setFormData({...formData, username: e.target.value})}
                    />
                  </div>

                  <div>
                    <label className="block text-sm font-medium mb-2">סיסמה *</label>
                    <input
                      type="password"
                      required
                      className="w-full p-3 border rounded-lg"
                      value={formData.password}
                      onChange={(e) => setFormData({...formData, password: e.target.value})}
                    />
                  </div>

                  <div>
                    <label className="block text-sm font-medium mb-2">אימייל *</label>
                    <input
                      type="email"
                      required
                      className="w-full p-3 border rounded-lg"
                      value={formData.email}
                      onChange={(e) => setFormData({...formData, email: e.target.value})}
                    />
                  </div>

                  <div>
                    <label className="block text-sm font-medium mb-2">טלפון *</label>
                    <input
                      type="tel"
                      required
                      className="w-full p-3 border rounded-lg"
                      value={formData.phone}
                      onChange={(e) => setFormData({...formData, phone: e.target.value})}
                    />
                  </div>

                  <div>
                    <label className="block text-sm font-medium mb-2">תפקיד *</label>
                    <select
                      className="w-full p-3 border rounded-lg"
                      value={formData.role}
                      onChange={(e) => setFormData({...formData, role: e.target.value})}
                    >
                      <option value="regular">👤 משתמש רגיל</option>
                      <option value="agent">🏢 מתווך</option>
                      <option value="admin">👑 מנהל</option>
                    </select>
                  </div>

                  <div className="flex gap-2 pt-4">
                    <button
                      type="submit"
                      className="flex-1 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-semibold"
                    >
                      צור משתמש
                    </button>
                    <button
                      type="button"
                      onClick={onClose}
                      className="px-6 py-3 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition"
                    >
                      ביטול
                    </button>
                  </div>
                </form>
              </div>
            </div>
          );
        };

        // ========== ACTIVITY LOGS PAGE ==========
        const ActivityLogsPage = ({ currentUser, logs, users, properties, setCurrentView }) => {
          const [filter, setFilter] = useState('all');

          if (currentUser?.role !== 'admin') {
            return (
              <div className="max-w-7xl mx-auto px-4 py-8">
                <div className="text-center py-16 bg-red-50 rounded-lg">
                  <p className="text-xl text-red-600 mb-4">אין לך הרשאה לצפות בעמוד זה</p>
                  <button
                    onClick={() => setCurrentView('home')}
                    className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition"
                  >
                    חזרה לעמוד הבית
                  </button>
                </div>
              </div>
            );
          }

          const getLogIcon = (type) => {
            const icons = {
              user_login: '🔓',
              user_logout: '🔒',
              user_register: '📝',
              property_create: '➕',
              property_edit: '✏️',
              property_delete: '🗑️',
              property_view: '👁️',
              user_create: '👤➕',
              user_edit: '👤✏️',
              user_delete: '👤🗑️'
            };
            return icons[type] || '📋';
          };

          const getLogText = (log) => {
            const texts = {
              user_login: `התחבר למערכת`,
              user_logout: `התנתק מהמערכת`,
              user_register: `נרשם למערכת`,
              property_create: `יצר נכס: ${log.details?.propertyTitle || 'נכס חדש'}`,
              property_edit: `ערך נכס: ${log.details?.propertyTitle || 'נכס'}`,
              property_delete: `מחק נכס: ${log.details?.propertyTitle || 'נכס'}`,
              property_view: `צפה בנכס: ${log.details?.propertyTitle || 'נכס'}`,
              user_create: `יצר משתמש: ${log.details?.newUserName || 'משתמש חדש'}`,
              user_edit: `ערך משתמש: ${log.details?.editedUserName || 'משתמש'}`,
              user_delete: `מחק משתמש: ${log.details?.deletedUserName || 'משתמש'}`
            };
            return texts[log.type] || 'פעולה לא מוכרת';
          };

          const formatTime = (timestamp) => {
            const date = new Date(timestamp);
            return date.toLocaleString('he-IL', {
              year: 'numeric',
              month: '2-digit',
              day: '2-digit',
              hour: '2-digit',
              minute: '2-digit'
            });
          };

          const filteredLogs = filter === 'all' ? logs : logs.filter(log => {
            if (filter === 'users') return log.type.includes('user');
            if (filter === 'properties') return log.type.includes('property');
            return true;
          });

          // Statistics
          const stats = {
            totalLogs: logs.length,
            logins: logs.filter(l => l.type === 'user_login').length,
            propertyViews: logs.filter(l => l.type === 'property_view').length,
            propertiesCreated: logs.filter(l => l.type === 'property_create').length
          };

          return (
            <div className="max-w-7xl mx-auto px-4 py-8">
              <div className="mb-8">
                <h2 className="text-3xl font-bold text-gray-900">📊 לוגים ופעילות מערכת</h2>
                <p className="text-gray-600 mt-1">מעקב אחר כל הפעולות במערכת</p>
              </div>

              {/* Statistics */}
              <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                <div className="bg-blue-50 rounded-lg p-4">
                  <p className="text-blue-600 text-sm font-semibold">סה״כ פעולות</p>
                  <p className="text-3xl font-bold text-blue-900">{stats.totalLogs}</p>
                </div>
                <div className="bg-green-50 rounded-lg p-4">
                  <p className="text-green-600 text-sm font-semibold">התחברויות</p>
                  <p className="text-3xl font-bold text-green-900">{stats.logins}</p>
                </div>
                <div className="bg-purple-50 rounded-lg p-4">
                  <p className="text-purple-600 text-sm font-semibold">צפיות בנכסים</p>
                  <p className="text-3xl font-bold text-purple-900">{stats.propertyViews}</p>
                </div>
                <div className="bg-amber-50 rounded-lg p-4">
                  <p className="text-amber-600 text-sm font-semibold">נכסים חדשים</p>
                  <p className="text-3xl font-bold text-amber-900">{stats.propertiesCreated}</p>
                </div>
              </div>

              {/* Filters */}
              <div className="flex gap-2 mb-6">
                <button
                  onClick={() => setFilter('all')}
                  className={`px-4 py-2 rounded-lg transition ${
                    filter === 'all' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                  }`}
                >
                  הכל
                </button>
                <button
                  onClick={() => setFilter('users')}
                  className={`px-4 py-2 rounded-lg transition ${
                    filter === 'users' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                  }`}
                >
                  👥 משתמשים
                </button>
                <button
                  onClick={() => setFilter('properties')}
                  className={`px-4 py-2 rounded-lg transition ${
                    filter === 'properties' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                  }`}
                >
                  🏠 נכסים
                </button>
              </div>

              {/* Logs List */}
              <div className="bg-white rounded-lg border">
                <div className="max-h-[600px] overflow-y-auto">
                  {filteredLogs.length === 0 ? (
                    <div className="p-8 text-center text-gray-500">
                      אין לוגים להצגה
                    </div>
                  ) : (
                    <div className="divide-y">
                      {filteredLogs.map(log => (
                        <div key={log.id} className="p-4 hover:bg-gray-50 transition">
                          <div className="flex items-start justify-between">
                            <div className="flex gap-3">
                              <span className="text-2xl">{getLogIcon(log.type)}</span>
                              <div>
                                <p className="font-semibold text-gray-900">
                                  {log.userName}
                                </p>
                                <p className="text-sm text-gray-600">
                                  {getLogText(log)}
                                </p>
                                <p className="text-xs text-gray-400 mt-1">
                                  {formatTime(log.timestamp)}
                                </p>
                              </div>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        };

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RealEstatePortal />);
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
